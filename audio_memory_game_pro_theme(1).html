<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Memory Game · Pro</title>
  <style>
    :root{
      --bg:#0b0d14; --panel:#0f121a; --card:#171b24; --card-face:#151925; --border:#252b39;
      --text:#e6e9f2; --muted:#9aa3b2; --accent:#4ea1ff; --ok:#30c48d; --bad:#ff5d6a;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto;
      color:var(--text); display:flex; flex-direction:column; align-items:center; gap:12px; padding:16px;
      background:linear-gradient(180deg, #0a0c13, #0b0d14 40%, #0a0c13 100%);
    }
    header{width:100%; max-width:1080px; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:10px}
    .title{font-weight:900; letter-spacing:.2px; font-size:clamp(18px, 2.2vw, 26px)}
    .controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
    button{
      background:var(--panel); color:var(--text); border:1px solid var(--border);
      padding:9px 14px; border-radius:10px; cursor:pointer; font-weight:700;
      transition: background .18s ease, transform .05s ease, border-color .18s ease;
    }
    button:hover{ background:#121623; border-color:#2e3546 }
    button:active{ transform:translateY(1px) }
    .stats{display:flex; gap:12px; align-items:center; flex-wrap:wrap; color:var(--muted); font-weight:600}
    .badge{background:#0f131f; border:1px solid var(--border); padding:6px 10px; border-radius:999px; font-weight:800; color:#cfd5e2}

    .progress{ width:100%; max-width:1080px; height:6px; background:#0e121b; border-radius:999px; border:1px solid var(--border); overflow:hidden }
    .progress>div{ height:100%; width:0%; background: linear-gradient(90deg, #2b7cff, #4ea1ff); transition: width .3s ease }

    #grid{ width:100%; max-width:1080px; flex:1; display:grid; gap:10px; align-content:start; min-height:220px }

    .card{
      position:relative; width:100%; border-radius:12px; overflow:hidden; cursor:pointer;
      background:linear-gradient(180deg, var(--card), #121622); border:1px solid var(--border);
      transition: transform .12s ease, filter .2s ease, border-color .2s ease, opacity .22s ease;
      user-select:none; perspective:900px; transform-style:preserve-3d;
    }
    /* Aspect-ratio fallback for older browsers */
    .card::before{ content:""; display:block; padding-top:100%; }

    .card.disabled{opacity:.45; cursor:not-allowed}
    .card.matched{ border-color:#275a45; box-shadow:0 0 0 2px #275a4599 inset }
    /* Keep position but hide visuals for matched cards */
    .card.gone{ visibility:hidden; opacity:0; transform:none; pointer-events:none }

    .flip{ position:absolute; inset:0; transform-style:preserve-3d; transition: transform .32s ease }
    .card.show .flip{ transform: rotateY(180deg) }

    .face,.back{ position:absolute; inset:0; display:grid; place-items:center; backface-visibility:hidden }
    .back{ background: radial-gradient(160px 160px at 50% 40%, #1a2030, #121723 70%) }
    .face{ transform: rotateY(180deg); background: linear-gradient(180deg, var(--card-face), #101524) }

    /* Pictograms */
    .glyph{ width:46%; max-width:72px; opacity:.92 }
    .glyph svg{ width:100%; height:auto; display:block }
    .back .glyph svg{ fill:#2b3347 }
    .face .glyph svg{ fill:#5d84ff }

    .counter{ position:absolute; top:8px; right:10px; font-size:12px; font-weight:800; background:#0c111ecc; padding:4px 8px; border-radius:999px; border:1px solid #283048; color:#cbd3e4; display:none }
    .card.show .counter{ display:inline-block }

    .toast{ position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:#0e1322; border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:10px; opacity:0; transition:opacity .2s ease, transform .2s ease; pointer-events:none }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px) }

    .status{ font-weight:800 }
    .card.mismatch{ box-shadow:0 0 0 2px #ff5d6a99 inset }
  </style>
</head>
<body>
  <header>
    <div class="title">Audio Memory Game · Pro</div>
    <div class="controls">
      <button id="restart">Restart</button>
      <span class="badge" id="levelBadge">Level 1</span>
    </div>
    <div class="stats">
      <span>Pairs matched: <strong id="matched">0</strong>/<span id="totalPairs">0</span></span>
      <span>Flips: <strong id="flips">0</strong></span>
      <span class="status" id="status"></span>
    </div>
  </header>

  <div class="progress" aria-hidden="true"><div id="progressFill"></div></div>
  <main id="grid" aria-label="Cards grid"></main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
// Ensure DOM is ready even if this script moves in the future
(function(){
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else { init(); }

  function init(){
    // ---- Audio engine (same timbre, pitch changes only) ----
    const AudioEngine = (() => {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const master = ctx.createGain();
      master.gain.value = 0.2; // overall volume
      master.connect(ctx.destination);
      function play(freq, duration=0.4) {
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(master);
        const attack = 0.01, decay = 0.08, sustain = 0.6, release = 0.15;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(1, now + attack);
        gain.gain.linearRampToValueAtTime(sustain, now + attack + decay);
        gain.gain.setValueAtTime(sustain, now + duration);
        gain.gain.linearRampToValueAtTime(0, now + duration + release);
        osc.start(now);
        osc.stop(now + duration + release + 0.02);
      }
      function resumeIfNeeded(){ if (ctx.state === 'suspended') ctx.resume(); }
      return { play, resumeIfNeeded };
    })();

    // ---- Game state & DOM ----
    const gridEl = document.getElementById('grid');
    const matchedEl = document.getElementById('matched');
    const totalPairsEl = document.getElementById('totalPairs');
    const flipsEl = document.getElementById('flips');
    const restartBtn = document.getElementById('restart');
    const levelBadge = document.getElementById('levelBadge');
    const statusEl = document.getElementById('status');
    const toastEl = document.getElementById('toast');

    if (!gridEl || !restartBtn || !matchedEl || !totalPairsEl || !flipsEl) {
      console.error('Critical DOM elements missing', { gridEl, restartBtn, matchedEl, totalPairsEl, flipsEl });
      showToast('Initialization error. Check console.');
      return;
    }

    let level = 1;
    let cards = [];
    let first = null, second = null;
    let lockBoard = false;
    let flipsTotal = 0;
    let matchedPairs = 0;

    // Frequencies (same timbre, different pitch)
    const base = 196; // G3
    const freqs = Array.from({length: 40}, (_,i) => +(base * Math.pow(2, i/12)).toFixed(2));

    function showToast(msg, timeout=1200){
      toastEl.textContent = msg; toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), timeout);
    }

    function updateGridTemplate(){
      const n = cards.length; const cols = Math.min(8, Math.ceil(Math.sqrt(n)));
      gridEl.style.gridTemplateColumns = `repeat(${cols}, minmax(84px, 1fr))`;
    }

    function nextCardCountForLevel(lvl){
      return Math.min(64, 2 * (lvl + 1));
    }

    function buildDeck(cardCount){
      const pairCount = cardCount/2;
      const chosen = freqs.slice(0, pairCount);
      const deck = [];
      let idCounter = 0;
      chosen.forEach((f, idx) => {
        deck.push({ id:idCounter++, pairId: idx, freq:f, flipsUsed:0, matched:false });
        deck.push({ id:idCounter++, pairId: idx, freq:f, flipsUsed:0, matched:false });
      });
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      return deck;
    }

    function render(){
      gridEl.innerHTML = '';
      cards.forEach((card) => {
        const cardEl = document.createElement('button');
        cardEl.className = 'card';
        cardEl.setAttribute('aria-label','Card');
        cardEl.dataset.id = card.id;

        const flip = document.createElement('div');
        flip.className = 'flip';

        const back = document.createElement('div');
        back.className = 'back';
        back.innerHTML = `
          <div class="glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2l3.2 6.5L22 9.2l-5 4.6L18 21l-6-3.4L6 21l1-7.2-5-4.6 6.8-.7L12 2z"/>
            </svg>
          </div>`;

        const face = document.createElement('div');
        face.className = 'face';
        face.innerHTML = `
          <div class="glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 12c2.5-4 4.5-4 7 0s4.5 4 7 0 4.5-4 7 0" fill="none" stroke="currentColor" stroke-width="2"/>
              <circle cx="8" cy="12" r="1.6"/>
              <circle cx="16" cy="12" r="1.6"/>
            </svg>
          </div>`;

        const counter = document.createElement('div');
        counter.className = 'counter';
        counter.textContent = `0/5`;
        face.appendChild(counter);

        flip.appendChild(back);
        flip.appendChild(face);
        cardEl.appendChild(flip);
        gridEl.appendChild(cardEl);

        card.element = cardEl;
        card.counterEl = counter;
        cardEl.addEventListener('click', () => onCardClick(card));
      });
    }

    const tinyDelay = (ms) => new Promise(res => setTimeout(res, ms));

    async function onCardClick(card){
      if (lockBoard || card.matched) return;
      const el = card.element;
      if (el.classList.contains('show')) return;
      if (card.flipsUsed >= 5) return;

      el.classList.add('show');
      card.flipsUsed++; card.counterEl.textContent = `${card.flipsUsed}/5`;
      flipsTotal++; flipsEl.textContent = flipsTotal;
      AudioEngine.resumeIfNeeded(); AudioEngine.play(card.freq, 0.36);

      if (!first){ first = card; return; }

      second = card; lockBoard = true;
      await tinyDelay(280);

      if (first.pairId === second.pairId){
        first.matched = true; second.matched = true;
        first.element.classList.add('matched');
        second.element.classList.add('matched');
        markGone(first.element);
        markGone(second.element);
        matchedPairs++; matchedEl.textContent = matchedPairs; updateProgress();
        statusEl.textContent = 'Matched';
        resetTurn();

        if (matchedPairs === cards.length/2){
          await tinyDelay(300);
          if (cards.length >= 64){ showToast('Board complete.'); statusEl.textContent = 'You win.'; }
          else { level++; showToast(`Level ${level}`); startLevel(level); }
        }
      } else {
        const firstIs5 = first.flipsUsed === 5; const secondIs5 = second.flipsUsed === 5;
        if (firstIs5 || secondIs5){ gameOver(); return; }
        statusEl.textContent = 'Try again';
        first.element.classList.add('mismatch');
        second.element.classList.add('mismatch');
        await tinyDelay(220);
        first.element.classList.remove('show','mismatch');
        second.element.classList.remove('show','mismatch');
        resetTurn();
      }
    }

    function resetTurn(){ first = null; second = null; lockBoard = false; }

    function gameOver(){
      lockBoard = true; statusEl.textContent = 'Game over';
      showToast('Mismatch on a 5/5 flip.');
      cards.forEach(c => c.element.classList.add('disabled'));
    }

    function startLevel(lvl){
      level = lvl;
      const cardCount = nextCardCountForLevel(level);
      const pairCount = cardCount/2;
      matchedPairs = 0; flipsTotal = 0; first = null; second = null; lockBoard = false;
      cards = buildDeck(cardCount);
      matchedEl.textContent = matchedPairs;
      totalPairsEl.textContent = pairCount;
      flipsEl.textContent = flipsTotal;
      levelBadge.textContent = `Level ${level}`;
      statusEl.textContent = '';
      updateGridTemplate();
      render();
      updateProgress();
    }

    if (restartBtn) restartBtn.addEventListener('click', () => startLevel(1));
    startLevel(1);

    function markGone(el){
      if(!el) return;
      el.classList.add('gone');
      el.setAttribute('aria-hidden','true');
      el.tabIndex = -1;
    }

    function updateProgress(){
      const total = cards.length/2 || 1; const pct = Math.round((matchedPairs/total)*100);
      const fill = document.getElementById('progressFill'); if (fill) fill.style.width = pct + '%';
    }

    // ----------------- Dev Tests (console) -----------------
    ;(function devTests(){
      try{
        console.group('%cAudio Memory Game · Pro – Tests','color:#4ea1ff');
        // Structure presence tests (DOM ready + elements exist)
        console.assert(!!document.getElementById('restart'), 'Restart button exists');
        console.assert(!!document.getElementById('grid'), 'Grid exists');
        console.assert(!!document.getElementById('matched'), 'Matched counter exists');
        console.assert(!!document.getElementById('totalPairs'), 'TotalPairs exists');
        console.assert(!!document.getElementById('flips'), 'Flips counter exists');

        // Level sizing tests
        console.assert(nextCardCountForLevel(1) === 4, 'Level 1 => 4 cards');
        console.assert(nextCardCountForLevel(2) === 6, 'Level 2 => 6 cards');
        console.assert(nextCardCountForLevel(3) === 8, 'Level 3 => 8 cards');
        console.assert(nextCardCountForLevel(30) === 64, 'Level cap at 64 cards');

        // Deck integrity tests
        const d = buildDeck(8);
        console.assert(d.length === 8, 'Deck of 8 cards');
        const counts = d.reduce((m,c)=>{m[c.pairId]=(m[c.pairId]||0)+1; return m;},{});
        const allPairsDouble = Object.values(counts).every(v=>v===2);
        console.assert(allPairsDouble, 'Each pair appears exactly twice');

        console.log('%cAll tests passed','color:#30c48d');
      }catch(e){ console.error('Dev tests error', e); }
      finally{ console.groupEnd(); }
    })();
    // -------------------------------------------------------
  }
})();
</script>
</body>
</html>
